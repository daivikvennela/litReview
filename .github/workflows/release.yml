name: Release installers

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-mac-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm --prefix app ci
          npm --prefix frontend ci
          npm run validate:release

      - name: Generate icon
        run: node scripts/generate-icon.mjs

      - name: Rebuild native modules for Electron (arm64)
        run: npm run rebuild:app-native

      - name: Require macOS signing secrets
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          missing=0
          for v in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!v:-}" ]; then
              echo "::error::Missing GitHub secret: $v — see docs/MACOS_SIGNING.md"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]

      - name: Build macOS arm64 DMG (signed + notarized)
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist:mac-arm64:signed

      - name: Verify code signature and notarization
        run: bash scripts/verify-mac-signing.sh

      - name: Verify better-sqlite3 native binary
        run: |
          test -n "$(find dist-installers -name '*.dmg' -print -quit)" || (echo "No DMG produced" && exit 1)
          hdiutil attach "$(find dist-installers -name '*-mac-arm64.dmg' | head -1)" -nobrowse -mountpoint /tmp/litreview-dmg
          test -f "/tmp/litreview-dmg/Lit Review Agent.app/Contents/Resources/app/node_modules/better-sqlite3/build/Release/better_sqlite3.node"
          hdiutil detach /tmp/litreview-dmg

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm64-installer
          path: dist-installers/*-mac-arm64.dmg

  build-mac-x64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm --prefix app ci
          npm --prefix frontend ci
          npm run validate:release

      - name: Generate icon
        run: node scripts/generate-icon.mjs

      - name: Rebuild native modules for Electron (x64)
        run: TARGET_ARCH=x64 npm run rebuild:app-native

      - name: Require macOS signing secrets
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          missing=0
          for v in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!v:-}" ]; then
              echo "::error::Missing GitHub secret: $v — see docs/MACOS_SIGNING.md"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]

      - name: Build macOS x64 DMG (signed + notarized)
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist:mac-x64:signed

      - name: Verify code signature and notarization
        run: bash scripts/verify-mac-signing.sh

      - name: Assert single x64 DMG artifact
        run: |
          count=$(find dist-installers -maxdepth 1 -name '*-mac-x64.dmg' | wc -l | tr -d ' ')
          test "$count" = "1" || (echo "Expected 1 x64 DMG, found $count" && ls -la dist-installers && exit 1)

      - name: Verify better-sqlite3 native binary
        run: |
          test -n "$(find dist-installers -name '*-mac-x64.dmg' -print -quit)" || (echo "No x64 DMG produced" && exit 1)
          hdiutil attach "$(find dist-installers -name '*-mac-x64.dmg' | head -1)" -nobrowse -mountpoint /tmp/litreview-dmg-x64
          test -f "/tmp/litreview-dmg-x64/Lit Review Agent.app/Contents/Resources/app/node_modules/better-sqlite3/build/Release/better_sqlite3.node"
          hdiutil detach /tmp/litreview-dmg-x64

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-x64-installer
          path: dist-installers/*-mac-x64.dmg

  build-win-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm --prefix app ci
          npm --prefix frontend ci
          npm run validate:release

      - name: Generate icon
        run: node scripts/generate-icon.mjs

      - name: Rebuild native modules for Electron (x64)
        run: npm run rebuild:app-native

      - name: Build Windows x64 installer
        run: npm run dist:win-x64

      - name: Verify installer exists
        shell: pwsh
        run: |
          if (-not (Get-ChildItem dist-installers/*-win-x64.exe)) { throw "No x64 installer" }

      - name: Upload Windows x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-x64-installer
          path: dist-installers/*-win-x64.exe

  build-win-arm64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm --prefix app ci
          npm --prefix frontend ci
          npm run validate:release

      - name: Generate icon
        run: node scripts/generate-icon.mjs

      - name: Rebuild native modules for Electron (arm64)
        run: npm run rebuild:app-native
        env:
          TARGET_ARCH: arm64

      - name: Build Windows arm64 installer
        run: npm run dist:win-arm64

      - name: Verify installer exists
        shell: pwsh
        run: |
          if (-not (Get-ChildItem dist-installers/*-win-arm64.exe)) { throw "No arm64 installer" }

      - name: Upload Windows arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-arm64-installer
          path: dist-installers/*-win-arm64.exe

  release:
    needs: [build-mac-arm64, build-mac-x64, build-win-x64, build-win-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: artifacts/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
