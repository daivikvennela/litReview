appId: edu.usc.litreview
productName: Lit Review Agent
copyright: Copyright (c) 2026 USC
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

directories:
  app: .
  output: dist-installers
  buildResources: build

# better-sqlite3 lives under extraResources/app — do not let electron-builder
# treat app/ as the Electron application package (it looks for index.js).
npmRebuild: false
nodeGypRebuild: false

icon: build/icon.png

files:
  - "!**/*"
  - dist-electron/**/*
  - package.json

asar: true

extraResources:
  - from: app
    to: app
    filter:
      - "**/*"
      - "!node_modules/.cache/**"
      - "!**/tsconfig.json"
      - "!server.bundle.*"
  - from: .env.example
    to: app/.env.example

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
  # Unsigned CI builds (set CSC_* secrets + hardenedRuntime for production signing)
  identity: "-"
  hardenedRuntime: false
  gatekeeperAssess: false
  notarize: false

dmg:
  title: Lit Review Agent ${version}
  window:
    width: 540
    height: 380

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  shortcutName: Lit Review Agent
  uninstallDisplayName: Lit Review Agent

publish: null
